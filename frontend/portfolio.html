<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Portfolio | Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="assets/js/main.js"></script>
</head>

<body id="theme-body" class="min-h-screen bg-slate-50 text-slate-950 transition-colors duration-300">

     <nav class="border-b border-opacity-20 py-4" id="portfolio-nav">
          <div class="mx-auto max-w-4xl px-4 flex justify-between items-center">
               <span class="text-xl font-bold tracking-tight">Skratchr Portfolios</span>
               <a href="index.html" class="text-sm font-semibold hover:underline">Build Your Own</a>
          </div>
     </nav>

     <main class="mx-auto max-w-4xl px-4 py-16 sm:px-6 lg:px-8">
          <div id="loading-state" class="text-center py-20">
               <i class="fa-solid fa-spinner fa-spin text-4xl text-slate-400"></i>
               <p class="mt-4 text-lg font-medium text-slate-600">Loading portfolio...</p>
          </div>

          <div id="error-state" class="hidden text-center py-20">
               <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-slate-200 mb-4">
                    <i class="fa-solid fa-lock text-2xl text-slate-500"></i>
               </div>
               <h1 class="text-2xl font-bold">Portfolio Unavailable</h1>
               <p id="error-message" class="mt-2 text-slate-600">This portfolio doesn't exist or is set to private.</p>
               <a href="index.html"
                    class="mt-6 inline-block rounded-md bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 transition-colors">Return
                    to Skratchr</a>
          </div>

          <div id="portfolio-content" class="hidden opacity-0 transition-opacity duration-500">
               <div class="flex flex-col md:flex-row gap-8 items-start">

                    <div class="w-full md:w-1/3 flex flex-col items-center md:items-start text-center md:text-left">
                         <img id="port-photo" src="" alt="Profile Photo"
                              class="h-48 w-48 rounded-full object-cover border-4 border-white shadow-lg mb-6">
                         <h1 id="port-name" class="text-3xl font-bold mb-1"></h1>
                         <p id="port-role" class="text-lg font-medium opacity-80 capitalize mb-6"></p>

                         <div class="w-full space-y-3 text-sm">
                              <a id="port-resume" href="#" target="_blank"
                                   class="block w-full text-center rounded-md bg-blue-600 px-4 py-3 font-semibold text-white hover:bg-blue-700 transition-colors shadow-sm">
                                   <i class="fa-solid fa-file-pdf mr-2"></i> View Full Resume
                              </a>
                         </div>
                    </div>

                    <div class="w-full md:w-2/3 md:pl-8 md:border-l border-opacity-20" id="main-content-border">
                         <section class="mb-10">
                              <h2 class="text-xl font-bold mb-4 uppercase tracking-wider text-sm opacity-60">About Me
                              </h2>
                              <p id="port-bio" class="text-lg leading-relaxed whitespace-pre-line"></p>
                         </section>

                         <section>
                              <h2 class="text-xl font-bold mb-4 uppercase tracking-wider text-sm opacity-60">Technical
                                   Skills</h2>
                              <div id="port-skills" class="flex flex-wrap text-white gap-2">
                              </div>
                         </section>
                    </div>
               </div>
          </div>
     </main>

     <script type="module" src="assets/js/portfolio.js"></script>
</body>

</html>
