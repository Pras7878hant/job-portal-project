<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Apply for Job - Job Portal</title>
     <link rel="stylesheet" href="assets/css/style.css">
     <link rel="stylesheet" href="assets/css/post-job.css">
     
</head>

<body>
     <div class="container">
          <h2>Apply for Job</h2>

          <div id="job-details-summary" class="job-info">
               Loading job details...
          </div>

          <div id="message" class="message hidden" style="display: none;"></div>

          <form id="application-form" enctype="multipart/form-data">
               <div class="form-group">
                    <label for="full-name">Your Full Name</label>
                    <input type="text" id="full-name" name="fullName" required readonly>
               </div>
               <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required readonly>
               </div>
               <div class="form-group">
                    <label for="phone-number">Your Phone Number</label>
                    <input type="tel" id="phone-number" name="phoneNumber" required readonly>
               </div>
               <div class="form-group">
                    <label for="cover-letter">Cover Letter (Optional)</label>
                    <textarea id="cover-letter" name="coverLetter" rows="6"
                         placeholder="Tell us why you're a great fit for this role..."></textarea>
               </div>
               <div class="form-group">
                    <label for="resume">Upload Resume (PDF only)</label>
                    <input type="file" id="resume" name="resume" accept=".pdf" required>
               </div>

               <button type="submit" class="btn-submit">Submit Application</button>
          </form>
          <a href="job-details.html" id="back-to-job-details" class="back-button">Back to Job Details</a>
     </div>

     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="assets/js/main.js"></script>
     <script type="module">
          // Import necessary utilities if they are external
          // import { getToken } from './assets/js/utils.js'; // Assuming getToken is in utils.js

          const messageDiv = document.getElementById('message');
          const jobDetailsSummary = document.getElementById('job-details-summary');
          const applicationForm = document.getElementById('application-form');
          const fullNameInput = document.getElementById('full-name');
          const emailInput = document.getElementById('email');
          const phoneNumberInput = document.getElementById('phone-number');
          const coverLetterInput = document.getElementById('cover-letter');
          const resumeInput = document.getElementById('resume');
          const submitButton = document.querySelector('.btn-submit');

          let currentJobId = null; // To store the job ID from the URL

          // Function to display messages (success/error)
          function showMessage(msg, type) {
               messageDiv.textContent = msg;
               messageDiv.className = `message ${type}`;
               messageDiv.style.display = 'block';
          }

          // Function to fetch job details
          async function fetchJobDetails(jobId) {
               try {
                    const token = localStorage.getItem('token'); // Retrieve token from localStorage
                    if (!token) {
                         showMessage('You are not authenticated. Please log in.', 'error');
                         window.location.href = 'login.html'; // Redirect to login
                         return null;
                    }

                    const response = await axios.get(`http://localhost:8000/api/v1/job/${jobId}`, {
                         headers: {
                              'Authorization': `Bearer ${token}`
                         }
                    });

                    if (response.data.success) {
                         const job = response.data.job;
                         jobDetailsSummary.innerHTML = `
                        <h3>${job.title}</h3>
                        <p><strong>Company:</strong> ${job.company ? job.company.name : 'N/A'}</p>
                        <p><strong>Location:</strong> ${job.location}</p>
                        <p><strong>Salary:</strong> ${job.salary}</p>
                        <p><strong>Job Type:</strong> ${job.jobType}</p>
                    `;
                         return job;
                    } else {
                         showMessage(response.data.message || 'Failed to load job details.', 'error');
                         return null;
                    }
               } catch (error) {
                    console.error('Error fetching job details:', error);
                    showMessage(error.response?.data?.message || 'Server error fetching job details.', 'error');
                    return null;
               }
          }

          // Function to fetch user profile (to pre-fill form)
          async function fetchUserProfile() {
               try {
                    const token = localStorage.getItem('token');
                    if (!token) {
                         showMessage('You are not authenticated. Please log in.', 'error');
                         return null;
                    }

                    const response = await axios.get('http://localhost:8000/api/v1/user/profile', {
                         headers: {
                              'Authorization': `Bearer ${token}`
                         }
                    });

                    if (response.data.success) {
                         const user = response.data.user;
                         fullNameInput.value = user.fullName || '';
                         emailInput.value = user.email || '';
                         phoneNumberInput.value = user.phone || ''; // Assuming 'phone' field exists in your User model
                         // If you also want to pre-fill resume or allow changing it, you'd handle that here.
                         // For now, we assume resume is uploaded fresh.
                         return user;
                    } else {
                         showMessage(response.data.message || 'Failed to load user profile.', 'error');
                         return null;
                    }
               } catch (error) {
                    console.error('Error fetching user profile:', error);
                    showMessage(error.response?.data?.message || 'Server error fetching user profile.', 'error');
                    return null;
               }
          }

          // Function to check if user has already applied
          async function checkApplicationStatus(jobId) {
               try {
                    const token = localStorage.getItem('token');
                    if (!token) return false;

                    const response = await axios.get(`http://localhost:8000/api/v1/application/check-status/${jobId}`, {
                         headers: {
                              'Authorization': `Bearer ${token}`
                         }
                    });

                    if (response.data.success && response.data.applied) {
                         showMessage(`You have already applied for this job. Status: ${response.data.status}`, 'info');
                         submitButton.disabled = true; // Disable submit button
                         submitButton.textContent = 'Already Applied';
                         return true;
                    }
                    return false;
               } catch (error) {
                    console.error('Error checking application status:', error);
                    // Don't show an error message if it's just about not finding an application
                    return false;
               }
          }


          // Handle form submission
          applicationForm.addEventListener('submit', async (event) => {
               event.preventDefault(); // Prevent default form submission

               showMessage('', 'hidden'); // Clear previous messages
               submitButton.disabled = true;
               submitButton.textContent = 'Submitting...';

               const token = localStorage.getItem('token');
               if (!token) {
                    showMessage('Authentication token not found. Please log in again.', 'error');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Submit Application';
                    return;
               }

               // Create FormData object
               const formData = new FormData();
               formData.append('coverLetter', coverLetterInput.value);

               // Append the resume file
               const resumeFile = resumeInput.files[0];
               if (resumeFile) {
                    formData.append('resume', resumeFile); // 'resume' MUST match the name in Multer's upload.single('resume')
               } else {
                    showMessage('Please select a resume file.', 'error');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Submit Application';
                    return;
               }

               try {
                    const response = await axios.post(`http://localhost:8000/api/v1/application/apply/${currentJobId}`, formData, {
                         headers: {
                              'Authorization': `Bearer ${token}`,
                              // 'Content-Type': 'multipart/form-data' is handled automatically by Axios/browser when using FormData
                         }
                    });

                    if (response.data.success) {
                         showMessage(response.data.message || 'Application submitted successfully!', 'success');
                         // Optionally clear form or redirect
                         applicationForm.reset();
                         // Maybe redirect after a short delay
                         setTimeout(() => {
                              window.location.href = `job-details.html?id=${currentJobId}`;
                         }, 2000);
                    } else {
                         showMessage(response.data.message || 'Application submission failed.', 'error');
                    }
               } catch (error) {
                    console.error('Error submitting application:', error);
                    showMessage(error.response?.data?.message || 'Server error submitting application. Please try again.', 'error');
               } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Submit Application';
               }
          });

          // Initialize on page load
          document.addEventListener('DOMContentLoaded', async () => {
               const urlParams = new URLSearchParams(window.location.search);
               currentJobId = urlParams.get('id');

               if (!currentJobId) {
                    showMessage('Job ID not found in URL. Cannot apply.', 'error');
                    jobDetailsSummary.textContent = 'No job selected.';
                    submitButton.disabled = true;
                    return;
               }

               // Update back button link
               document.getElementById('back-to-job-details').href = `job-details.html?id=${currentJobId}`;

               // Fetch job details and user profile concurrently
               const [job, user] = await Promise.all([
                    fetchJobDetails(currentJobId),
                    fetchUserProfile()
               ]);

               // Check if user has already applied AFTER fetching job and user details
               // This ensures all necessary data is loaded before checking application status
               if (job && user) { // Only proceed if both job and user data are loaded
                    await checkApplicationStatus(currentJobId);
               }
          });
     </script>
</body>

</html>
