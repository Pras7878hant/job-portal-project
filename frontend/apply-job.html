<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Apply for Job - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="assets/js/main.js"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-3xl px-4 py-10 sm:px-6 lg:px-8">
          <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
               <h1 class="text-3xl font-bold">Apply for Job</h1>
               <div id="job-details-summary"
                    class="mt-6 rounded-md border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700">Loading job
                    details...</div>
               <div id="message" class="mt-4" style="display: none;"></div>

               <form id="application-form" enctype="multipart/form-data" class="mt-6 grid gap-4">
                    <div>
                         <label for="full-name" class="block text-sm font-medium text-slate-700">Your Full Name</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 bg-slate-100 px-3 py-2 text-sm"
                              type="text" id="full-name" name="fullName" required readonly>
                    </div>
                    <div>
                         <label for="email" class="block text-sm font-medium text-slate-700">Your Email</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 bg-slate-100 px-3 py-2 text-sm"
                              type="email" id="email" name="email" required readonly>
                    </div>
                    <div>
                         <label for="phone-number" class="block text-sm font-medium text-slate-700">Your Phone
                              Number</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 bg-slate-100 px-3 py-2 text-sm"
                              type="tel" id="phone-number" name="phoneNumber" required readonly>
                    </div>
                    <div>
                         <label for="cover-letter" class="block text-sm font-medium text-slate-700">Cover Letter</label>
                         <textarea class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm"
                              id="cover-letter" name="coverLetter" rows="6"
                              placeholder="Tell the recruiter why you're a strong fit."></textarea>
                    </div>
                    <div>
                         <label for="resume" class="block text-sm font-medium text-slate-700">Resume</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="file"
                              id="resume" name="resume" accept=".pdf,.doc,.docx" required>
                    </div>
                    <div class="flex flex-wrap gap-3">
                         <button type="submit"
                              class="btn-submit rounded-md bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Submit
                              Application</button>
                         <a href="job-details.html" id="back-to-job-details"
                              class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">Back
                              to Job Details</a>
                    </div>
               </form>
          </section>
     </main>

     <script type="module" src="./assets/js/apply-job-logic.js"></script>
</body>

</html>
