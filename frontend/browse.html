<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Browse Jobs - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="./assets/js/main.js"></script>
</head>

<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
          <div class="flex flex-col gap-4 border-b border-slate-200 pb-6 md:flex-row md:items-end md:justify-between">
               <div>
                    <p id="welcome-message" class="text-sm font-semibold uppercase tracking-widest text-slate-500"></p>
                    <h1 class="mt-2 text-3xl font-bold">Browse Jobs</h1>
               </div>
               <a href="applications.html"
                    class="hidden rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-white"
                    id="my-applications-btn">My Applications</a>
          </div>

          <ul id="job-list" class="mt-8 grid gap-4 md:grid-cols-2 lg:grid-cols-3">
               <p id="loading-message" class="text-slate-600">Loading jobs...</p>
               <p id="error-message" class="hidden rounded-md border border-red-200 bg-red-50 p-4 text-sm text-red-800">
               </p>
               <p id="no-jobs-message" class="hidden text-slate-600">No jobs found at the moment.</p>
          </ul>
     </main>
     <script type="module" src="./assets/js/browse.js"></script>
</body>

</html>
