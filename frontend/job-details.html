<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Details - Job Portal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/job-details.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      width: 100%;
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }

    .footer {
      background-color: #f1f1f1;
      text-align: center;
      padding: 1rem;
      color: #555;
      font-size: 0.9rem;
      border-top: 1px solid #ddd;
      margin-top: auto;
    }

    #apply-btn {
      display: block;
      margin-top: 20px;
      padding: 0.75rem 1.5rem;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    #apply-btn.hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="page-wrapper">
    <div class="container">
      <div id="job-details">
        <p>Loading job details...</p>
      </div>
      <button id="apply-btn" class="hidden">Apply Now</button>
      <button onclick="window.history.back()" style="background-color: #6c757d; margin-top: 10px">
        Back to Jobs
      </button>
    </div>

    <footer class="footer">
      <p>&copy; 2025 Skratcher. All rights reserved.</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script type="module" src="./assets/js/utils.js"></script>
  <script type="module" src="./assets/js/job-details.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
