<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>My Companies - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
          <div class="flex flex-col gap-4 border-b border-slate-200 pb-6 md:flex-row md:items-end md:justify-between">
               <div>
                    <h1 class="text-3xl font-bold">My Companies</h1>
                    <p class="mt-2 text-slate-600">Manage company profiles used for job posts.</p>
               </div>
               <div class="flex flex-wrap gap-3">
                    <a href="company-setup.html" class="rounded-md bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Register Company</a>
                    <a href="../post-job.html" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-white">Post Job</a>
                    <button id="logoutBtn" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-white">Logout</button>
               </div>
          </div>
          <div id="message" class="mt-6" style="display: none;"></div>
          <div id="companies-list" class="mt-8 grid gap-4">
               <p class="text-slate-600">Loading companies...</p>
          </div>
     </main>
     <script type="module" src="../assets/js/admin-companies.js"></script>
</body>
</html>
