<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Register Company - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-2xl px-4 py-10 sm:px-6 lg:px-8">
          <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
               <div class="flex items-start justify-between gap-4">
                    <div>
                         <h1 class="text-3xl font-bold">Register New Company</h1>
                         <p class="mt-2 text-sm text-slate-600">Add a company before posting jobs.</p>
                    </div>
                    <button id="logoutBtn" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">Logout</button>
               </div>

               <form id="company-setup-form" class="mt-6 grid gap-4">
                    <div>
                         <label for="company-name" class="block text-sm font-medium text-slate-700">Company Name</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="text" id="company-name" name="name" required>
                    </div>
                    <div>
                         <label for="company-description" class="block text-sm font-medium text-slate-700">Description</label>
                         <textarea class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" id="company-description" name="description" rows="5" required></textarea>
                    </div>
                    <div>
                         <label for="company-website" class="block text-sm font-medium text-slate-700">Website</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="url" id="company-website" name="website">
                    </div>
                    <div>
                         <label for="company-location" class="block text-sm font-medium text-slate-700">Location</label>
                         <input class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm" type="text" id="company-location" name="location" placeholder="New Delhi, India">
                    </div>
                    <button type="submit" class="rounded-md bg-slate-950 px-4 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">Register Company</button>
               </form>
               <div id="message" class="mt-4" style="display: none;"></div>
          </section>
     </main>
     <script type="module" src="../assets/js/company-setup.js"></script>
</body>
</html>
