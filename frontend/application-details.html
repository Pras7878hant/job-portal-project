<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Application Details - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="assets/js/main.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-4xl px-4 py-10 sm:px-6 lg:px-8">
          <section class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
               <h1 class="text-3xl font-bold">Application Details</h1>
               <div id="application-details" class="mt-6">
                    <p id="loading-message" class="text-slate-600">Loading application details...</p>
                    <p id="error-message" class="hidden rounded-md border border-red-200 bg-red-50 p-4 text-sm text-red-800"></p>
               </div>
               <a id="backToJobsBtn" href="javascript:void(0);" class="mt-6 inline-flex rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50">Back</a>
          </section>
     </main>
     <script type="module">
          import { APPLICATION_API_END_POINT } from './assets/js/utils.js';

          const applicationId = new URLSearchParams(window.location.search).get('id');
          const userRole = localStorage.getItem('userRole') || localStorage.getItem('role');
          const token = localStorage.getItem('token');
          const backToJobsBtn = document.getElementById('backToJobsBtn');

          if (!userRole || !token) {
               window.location.href = 'login.html';
          } else {
               backToJobsBtn.href = userRole === 'student' ? 'applications.html' : 'jobs.html';
          }

          document.addEventListener('DOMContentLoaded', fetchApplicationDetails);

          async function fetchApplicationDetails() {
               const detailsDiv = document.getElementById('application-details');
               const loadingMessage = document.getElementById('loading-message');
               const errorMessage = document.getElementById('error-message');

               if (!applicationId) {
                    loadingMessage.classList.add('hidden');
                    errorMessage.textContent = 'Application ID is missing from the URL.';
                    errorMessage.classList.remove('hidden');
                    return;
               }

               try {
                    const response = await axios.get(`${APPLICATION_API_END_POINT}/${applicationId}`, {
                         headers: { Authorization: `Bearer ${token}` },
                         withCredentials: true
                    });

                    const application = response.data.application;
                    const applicant = application.applicant || {};
                    const job = application.job || {};
                    const appliedDate = application.appliedAt || application.createdAt;

                    detailsDiv.innerHTML = `
                         <div class="grid gap-5">
                              <section class="rounded-md border border-slate-200 bg-slate-50 p-4">
                                   <h2 class="font-semibold text-slate-950">Job Information</h2>
                                   <div class="mt-3 grid gap-2 text-sm text-slate-700 sm:grid-cols-2">
                                        <p><strong>Job Title:</strong> ${job.title || 'N/A'}</p>
                                        <p><strong>Company:</strong> ${job.company?.name || 'N/A'}</p>
                                        <p><strong>Location:</strong> ${job.location || 'N/A'}</p>
                                        <p><strong>Job Type:</strong> ${job.jobType || 'N/A'}</p>
                                        <p><strong>Salary:</strong> ${job.salary ? 'Rs. ' + job.salary.toLocaleString() : 'N/A'}</p>
                                        <p><strong>Experience:</strong> ${job.experienceLevel || 'N/A'}</p>
                                   </div>
                              </section>
                              <section class="rounded-md border border-slate-200 bg-slate-50 p-4">
                                   <h2 class="font-semibold text-slate-950">Applicant Information</h2>
                                   <div class="mt-3 grid gap-2 text-sm text-slate-700 sm:grid-cols-2">
                                        <p><strong>Name:</strong> ${applicant.fullName || 'N/A'}</p>
                                        <p><strong>Email:</strong> ${applicant.email || 'N/A'}</p>
                                        <p><strong>Phone:</strong> ${applicant.phone || 'N/A'}</p>
                                        <p><strong>Resume:</strong> ${application.resume ? `<a href="${application.resume}" target="_blank" class="font-semibold text-slate-950 underline">View Resume</a>` : 'Not provided'}</p>
                                        <p class="sm:col-span-2"><strong>Skills:</strong> ${applicant.skills?.length ? applicant.skills.join(', ') : 'No skills listed'}</p>
                                   </div>
                              </section>
                              <section class="rounded-md border border-slate-200 bg-slate-50 p-4">
                                   <h2 class="font-semibold text-slate-950">Application</h2>
                                   <div class="mt-3 grid gap-2 text-sm text-slate-700 sm:grid-cols-2">
                                        <p><strong>Status:</strong> <span class="capitalize">${application.status || 'pending'}</span></p>
                                        <p><strong>Applied On:</strong> ${appliedDate ? new Date(appliedDate).toLocaleDateString() : 'N/A'}</p>
                                        <p class="sm:col-span-2"><strong>Cover Letter:</strong> ${application.coverLetter || 'No cover letter provided.'}</p>
                                   </div>
                              </section>
                         </div>
                    `;
               } catch (error) {
                    loadingMessage.classList.add('hidden');
                    errorMessage.textContent = error.response?.data?.message || 'An error occurred while fetching details.';
                    errorMessage.classList.remove('hidden');
               }
          }
     </script>
</body>
</html>
