<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post New Job - Recruiter Dashboard</title>
    <link rel="stylesheet" href="../assets/css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script type="module" src="assets/js/main.js"></script>

    <script>
      if (typeof axios !== "undefined") {
        axios.defaults.withCredentials = true;
        // console.log("Axios withCredentials set to true globally.");
      } else {
        console.error(
          "Axios is not defined. Ensure axios.min.js is loaded correctly."
        );
      }
    </script>

    <script type="module" src="../assets/js/utils.js"></script>
    <script type="module" src="../assets/js/post-job.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f3f4f6;
        margin: 0;
        min-height: 100vh;
        padding-bottom: 60px;
      }

      .header-container {
        background-color: #fff;
        padding: 1rem 2rem;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header-container h1 {
        margin: 0;
        color: #333;
        font-size: 1.8rem;
      }

      .user-actions {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .logout-btn {
        padding: 0.6rem 1.2rem;
        background-color: #dc3545;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: background-color 0.3s ease;
      }

      .logout-btn:hover {
        background-color: #c82333;
      }

      .container {
        width: 100%;
        max-width: 700px;
        margin: 2rem auto;
        padding: 2.5rem;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
      }

      h2 {
        font-size: 2rem;
        margin-bottom: 1.5rem;
        text-align: center;
        color: #333;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: bold;
        color: #333;
      }

      .form-group input[type="text"],
      .form-group input[type="number"],
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 1rem;
      }

      .form-group textarea {
        min-height: 100px;
        resize: vertical;
      }

      .form-group input[type="checkbox"] {
        margin-right: 10px;
      }

      .btn-submit {
        display: block;
        width: 100%;
        padding: 1rem;
        background-color: #3b82f6;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .btn-submit:hover {
        background-color: #2563eb;
      }

      .message {
        margin-top: 1rem;
        padding: 0.8rem;
        border-radius: 4px;
        font-weight: bold;
        text-align: center;
      }

      .message.success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .message.error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      .back-button {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background-color: #6c757d;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        transition: background-color 0.3s ease;
      }

      .back-button:hover {
        background-color: #5a6268;
      }
    </style>
  </head>

  <body>
    <div class="header-container">
      <h1>Recruiter Dashboard</h1>
      <div class="user-actions">
        <span id="welcome-message"></span>
        <button class="logout-btn">Logout</button>
      </div>
    </div>

    <div class="container">
      <h2>Post New Job</h2>
      <form id="post-job-form">
        <div class="form-group">
          <label for="title">Job Title</label>
          <input type="text" id="title" name="title" required />
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            rows="5"
            required
          ></textarea>
        </div>
        <div class="form-group">
          <label for="requirements">Requirements (comma-separated)</label>
          <input
            type="text"
            id="requirements"
            name="requirements"
            placeholder="e.g., JavaScript, React, Node.js"
            required
          />
        </div>
        <div class="form-group">
          <label for="salary">Salary (per year)</label>
          <input type="number" id="salary" name="salary" required />
        </div>
        <div class="form-group">
          <label for="location">Location</label>
          <input type="text" id="location" name="location" required />
        </div>
        <div class="form-group">
          <label for="jobType">Job Type</label>
          <select id="jobType" name="jobType" required>
            <option value="">Select Job Type</option>
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Contract">Contract</option>
            <option value="Temporary">Temporary</option>
            <option value="Internship">Internship</option>
          </select>
        </div>
        <div class="form-group">
          <label for="experienceLevel">Experience Level</label>
          <select id="experienceLevel" name="experienceLevel" required>
            <option value="">Select Experience Level</option>
            <option value="Entry-Level">Entry-Level</option>
            <option value="Mid-Level">Mid-Level</option>
            <option value="Senior-Level">Senior-Level</option>
            <option value="Director">Director</option>
            <option value="Executive">Executive</option>
          </select>
        </div>
        <div class="form-group">
          <label for="position">Position</label>
          <input type="text" id="position" name="position" required />
        </div>
        <div class="form-group">
          <label for="company">Company</label>
          <select id="company" name="companyId" required>
            <option value="">Loading companies...</option>
          </select>
        </div>
        <button type="submit" class="btn-submit">Post Job</button>
        <div id="message" class="message" style="display: none"></div>
      </form>
      <div
        id="company-redirect-message"
        style="
          display: none;
          margin-top: 1rem;
          padding: 1rem;
          background-color: #ffeeba;
          border: 1px solid #ffeb8f;
          color: #664d03;
          border-radius: 4px;
          text-align: center;
        "
      >
        You haven't registered any companies yet. Please
        <a href="company-setup.html">register a company</a>
        first.
      </div>
      <a href="jobs.html" class="back-button">Back to My Jobs</a>
    </div>
  </body>
</html>
