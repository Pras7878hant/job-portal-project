<!DOCTYPE html>
<html lang="en"><!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Sign Up - Job Portal</title>
     <link rel="stylesheet" href="assets/css/style.css">
     <link rel="stylesheet" href="assets/css/signup.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <!-- <script type="module" src="./assets//js//main.js"></script> -->
   
</head>

<body>
     <div class="container">
          <h1>Sign Up</h1>
          <form id="signup-form">
               <div>
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
               </div>
               <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
               </div>
               <div>
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required>
               </div>
               <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
               </div>
               <div>
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                         <option value="student">Student</option>
                         <option value="recruiter">Recruiter</option>
                    </select>
               </div>
               <button type="submit">Sign Up</button>
          </form>
          <a href="login.html">Already have an account? Login</a>
     </div>

     <script>
          document.getElementById('signup-form').addEventListener('submit', async (event) => {
               event.preventDefault();

               const fullName = document.getElementById('fullName').value;
               const email = document.getElementById('email').value;
               const phoneNumber = document.getElementById('phoneNumber').value;
               const password = document.getElementById('password').value;
               const role = document.getElementById('role').value;

               // Create a plain JavaScript object
               const requestBody = {
                    fullName: fullName, // Match schema
                    email: email,
                    phone: phoneNumber, // Match schema (phone)
                    password: password,
                    role: role
               };

               // Log the data being sent for debugging
               console.log('Signup form data:', requestBody);

               try {
                    const response = await fetch('http://localhost:8000/api/v1/user/register', {
                         method: 'POST',
                         headers: {
                              'Content-Type': 'application/json' // <-- IMPORTANT: Specify JSON content type
                         },
                         body: JSON.stringify(requestBody) // <-- IMPORTANT: Stringify the JSON object
                    });

                    const data = await response.json();
                    console.log('Signup response:', data);

                    if (data.success) {
                         alert(data.message);
                         window.location.href = 'login.html';
                    } else {
                         alert(data.message);
                    }
               } catch (error) {
                    console.error('Signup error:', error);
                    alert('An error occurred during signup.');
               }
          });
     </script>
</body>

</html>
