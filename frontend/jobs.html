<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Manage Jobs - Skratchr</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
     <script type="module" src="./assets/js/main.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-950">
     <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
          <div class="flex flex-col gap-4 border-b border-slate-200 pb-6 md:flex-row md:items-end md:justify-between">
               <div>
                    <h1 class="text-3xl font-bold">Manage Jobs</h1>
                    <p class="mt-2 text-slate-600">Review postings and update applicant status.</p>
               </div>
               <div class="flex gap-3">
                    <a href="post-job.html" class="rounded-md bg-slate-950 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800">Post New Job</a>
                    <button id="logoutButton" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-white">Logout</button>
               </div>
          </div>
          <div id="message" class="mt-6" style="display: none;"></div>
          <div id="jobs-list" class="mt-8 grid gap-5"></div>
          <p id="no-jobs-message" class="mt-8 hidden text-slate-600">No jobs posted yet.</p>
     </main>

     <script type="module">
          import { JOB_API_END_POINT, APPLICATION_API_END_POINT, handleLogout, displayMessage } from './assets/js/utils.js';

          axios.defaults.withCredentials = true;
          const token = localStorage.getItem('token');
          const userRole = localStorage.getItem('userRole') || localStorage.getItem('role');
          const authHeaders = token ? { Authorization: `Bearer ${token}` } : {};

          document.getElementById('logoutButton').addEventListener('click', handleLogout);
          window.deleteJob = deleteJob;
          window.updateApplicationStatus = updateApplicationStatus;

          if (!token || userRole !== 'recruiter') {
               displayMessage('You must be logged in as a recruiter.', 'error');
               setTimeout(() => window.location.href = 'login.html', 1200);
          } else {
               fetchRecruiterJobs();
          }

          async function fetchRecruiterJobs() {
               try {
                    const jobsResponse = await axios.get(`${JOB_API_END_POINT}/recruiter-jobs`, {
                         headers: authHeaders,
                         withCredentials: true
                    });
                    const jobs = jobsResponse.data.jobs || [];
                    const jobsList = document.getElementById('jobs-list');
                    const noJobsMessage = document.getElementById('no-jobs-message');

                    jobsList.innerHTML = '';
                    noJobsMessage.classList.toggle('hidden', jobs.length > 0);

                    jobs.forEach(job => {
                         const jobCard = document.createElement('article');
                         jobCard.className = 'rounded-lg border border-slate-200 bg-white p-5 shadow-sm';
                         jobCard.dataset.jobId = job._id;

                         const applications = job.applications || [];
                         const applicationsHtml = applications.length
                              ? applications.map(application => {
                                   const applicant = application.applicant || {};
                                   return `
                                        <li class="rounded-md border border-slate-200 bg-slate-50 p-4">
                                             <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                                                  <div>
                                                       <p class="font-semibold">${applicant.fullName || 'Student Name N/A'}</p>
                                                       <p class="text-sm text-slate-600">${applicant.email || 'N/A'}</p>
                                                  </div>
                                                  <select class="rounded-md border border-slate-300 px-3 py-2 text-sm" onchange="updateApplicationStatus('${application._id}', this.value)">
                                                       <option value="pending" ${application.status === 'pending' ? 'selected' : ''}>Pending</option>
                                                       <option value="reviewed" ${application.status === 'reviewed' ? 'selected' : ''}>Reviewed</option>
                                                       <option value="interview" ${application.status === 'interview' ? 'selected' : ''}>Interview</option>
                                                       <option value="accepted" ${application.status === 'accepted' ? 'selected' : ''}>Accepted</option>
                                                       <option value="rejected" ${application.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                                                  </select>
                                                  <a href="application-details.html?id=${application._id}" class="rounded-md bg-slate-950 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-800">View Details</a>
                                             </div>
                                        </li>
                                   `;
                              }).join('')
                              : '<li class="text-sm text-slate-600">No applications for this job yet.</li>';

                         jobCard.innerHTML = `
                              <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
                                   <div>
                                        <p class="text-sm font-semibold uppercase tracking-widest text-slate-500">${job.company?.name || 'N/A'}</p>
                                        <h2 class="mt-1 text-xl font-bold">${job.title}</h2>
                                        <p class="mt-2 text-sm text-slate-600">${job.location} · ${job.jobType}</p>
                                   </div>
                                   <button class="rounded-md border border-red-200 px-3 py-2 text-sm font-semibold text-red-700 hover:bg-red-50" onclick="deleteJob('${job._id}')">Delete</button>
                              </div>
                              <h3 class="mt-6 font-semibold">Applications</h3>
                              <ul class="mt-3 grid gap-3">${applicationsHtml}</ul>
                         `;
                         jobsList.appendChild(jobCard);
                    });
               } catch (error) {
                    displayMessage(error.response?.data?.message || 'Error fetching your jobs. Please try again.', 'error');
               }
          }

          async function deleteJob(jobId) {
               if (!confirm('Are you sure you want to delete this job?')) return;

               try {
                    const response = await axios.delete(`${JOB_API_END_POINT}/${jobId}`, {
                         headers: authHeaders,
                         withCredentials: true
                    });
                    if (response.data.success) {
                         displayMessage('Job deleted successfully.', 'success');
                         await fetchRecruiterJobs();
                    }
               } catch (error) {
                    displayMessage(error.response?.data?.message || 'An error occurred while deleting the job.', 'error');
               }
          }

          async function updateApplicationStatus(applicationId, newStatus) {
               try {
                    const response = await axios.put(`${APPLICATION_API_END_POINT}/status/${applicationId}`, { status: newStatus }, {
                         headers: authHeaders,
                         withCredentials: true
                    });
                    if (response.data.success) {
                         displayMessage(`Application status updated to ${newStatus}.`, 'success');
                    }
               } catch (error) {
                    displayMessage(error.response?.data?.message || 'An error occurred while updating status.', 'error');
               }
          }
     </script>
</body>
</html>
